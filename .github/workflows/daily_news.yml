name: AI News Bot Daily Sync

on:
  schedule:
    # 發車時間（台灣時間 = UTC+8）：
    # UTC 23:15 -> TW 07:15
    # UTC 02:15 -> TW 10:15
    # UTC 08:15 -> TW 16:15
    # UTC 11:15 -> TW 19:15
    # 註：GitHub 排程會延遲數分鐘~十幾分鐘，屬正常現象
    - cron: '15 23,2,8,11 * * *'
  
  workflow_dispatch: # 保持這個，方便您手動測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許寫入權限以更新 PWA
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # ⚠️ 關鍵修正：必須安裝 google-genai 才能驅動新版 AI
        run: pip install requests google-genai

      - name: Run Bot
        env: # 注入金鑰
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push PWA Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 只有當新聞有更新時才上傳，避免錯誤
          if [[ -n $(git status -s latest_news.json) ]]; then
            git add latest_news.json
            git commit -m "🤖 Auto-update News: $(date)"
            git push
          else
            echo "No changes to commit"
          fi
