name: Daily News Bot

on:
  schedule:
    # 台灣時間 09, 12, 18, 21 點 [cite: 737, 946]
    - cron: '0 1,4,10,13 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-genai [cite: 750]

      - name: Run Bot
        env:
          # ⚠️ 確保這裡的 Secrets 名稱與您設定的一致 [cite: 752-755]
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        [cite_start]run: python main.py [cite: 756]

      - name: Commit and Push PWA Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add latest_news.json
          git commit -m "🤖 Auto-update News: $(date)" || exit 0
          git push [cite: 757-763]
